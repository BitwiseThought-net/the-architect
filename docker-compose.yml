services:
  service:
    container_name: the-architect
    build:
      context: .
      dockerfile: Dockerfile
    stdin_open: true
    tty: true
    volumes:
      - ai-memory:/app/.crewai
      - .:/app/config_mount:ro
      - ./plugins:/app/plugins:ro
      - ./output:/app/output
#      - ./knowledge:/app/knowledge
      - /media/knowledge:/app/knowledge
    working_dir: /app
    env_file:
      - .env
    environment:
      - TEAM_CONFIG=team.json
      - PYTHONUNBUFFERED=1
      - PYTHONPATH=.
      - OPENAI_API_BASE=${LITELLM_BASE_URL}
      - CHROMA_API_BASE=http://chromadb:8000
      - CREWAI_STORAGE_DIR=/app/.crewai
    depends_on:
      - litellm
      - chromadb
    healthcheck:
      test: "sh -c '[ $(($(date +%s) - $(stat -c %Y /tmp/heartbeat))) -lt 300 ]'"
      interval: 1m
      timeout: 10s
      retries: 3
      start_period: 2m
    labels:
      autoheal: true

  ollama:
    container_name: ai-ollama
    image: ollama/ollama:latest
    restart: always
    ports:
      - "11434:11434"
    env_file:
      - .env
    volumes:
      - ./ollama:/root/.ollama
    # Added mkdir -p plugins to ensure the directory exists for the service mount
    entrypoint: /bin/sh -c "mkdir -p plugins && ollama serve & sleep 5 && ollama pull ${MODEL_NAME} && ollama pull nomic-embed-text && wait"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    labels:
      autoheal: true

  litellm:
    container_name: ai-litellm
    image: ghcr.io/berriai/litellm:main-latest
    restart: always
    ports:
      - "${LITELLM_PORT}:4000"
    env_file:
      - .env
    environment:
      - OLLAMA_API_BASE=${OLLAMA_BASE_URL}
    command: ["--model", "ollama/${MODEL_NAME}", "--port", "4000", "--drop_params"]
    depends_on:
      - ollama
    labels:
      autoheal: true

  chromadb:
    container_name: ai-chromadb
    image: chromadb/chroma:latest
    restart: always
    ports:
      - "8000:8000"
    volumes:
      - ./chroma-data:/chroma/chroma
    environment:
      - IS_PERSISTENT=TRUE
      - ANONYMIZED_TELEMETRY=FALSE
    labels:
      autoheal: true

  openwebui:
    container_name: ai-openwebui
    image: ghcr.io/open-webui/open-webui:main
    restart: always
    ports:
      - "${UI_PORT}:8080"
    volumes:
      - ./open-webui:/app/backend/data
    env_file:
      - .env
    environment:
      - "OPENAI_API_BASE_URL=${LITELLM_BASE_URL}"
    depends_on:
      - ollama
    labels:
      autoheal: true

  autoheal:
    container_name: ai-autoheal
    depends_on:
      - service
    image: willfarrell/autoheal:latest
    restart: always
    environment:
      - AUTOHEAL_CONTAINER_LABEL=autoheal
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    labels:
      autoheal: true

volumes:
  ai-memory:
