services:
  ollama:
    container_name: agent-ollama
    image: ollama/ollama:latest
    restart: always
    ports:
      - "11434:11434"
    env_file:
      - .env
    volumes:
      - ./ollama:/root/.ollama
    entrypoint: /bin/sh -c "ollama serve & sleep 5 && ollama pull ${MODEL_NAME} && ollama pull nomic-embed-text && wait"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  litellm:
    container_name: agent-litellm
    image: ghcr.io/berriai/litellm:main-latest
    restart: always
    ports:
      - "${LITELLM_PORT}:4000"
    env_file:
      - .env
    environment:
      - OLLAMA_API_BASE=${OLLAMA_BASE_URL}
    command: ["--model", "ollama/${MODEL_NAME}", "--port", "4000", "--drop_params"]
    depends_on:
      - ollama

  chromadb:
    container_name: agent-chromadb
    image: chromadb/chroma:latest
    restart: always
    ports:
      - "8000:8000"
    volumes:
      - ./chroma-data:/chroma/chroma
    environment:
      - IS_PERSISTENT=TRUE
      - ANONYMIZED_TELEMETRY=FALSE

  openwebui:
    container_name: agent-open-webui
    image: ghcr.io/open-webui/open-webui:main
    restart: always
    ports:
      - "${UI_PORT}:8080"
    volumes:
      - ./open-webui:/app/backend/data
    env_file:
      - .env
    environment:
      - "OPENAI_API_BASE_URL=${LITELLM_BASE_URL}"
    depends_on:
      - ollama

  service:
    container_name: agent-smith
    build:
      context: .
      dockerfile: Dockerfile
    stdin_open: true
    tty: true
    volumes:
      - agent-memory:/app/.crewai
    working_dir: /app
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONPATH=.
      - OPENAI_API_BASE=${LITELLM_BASE_URL}
      - CHROMA_API_BASE=http://chromadb:8000
      - CREWAI_STORAGE_DIR=/app/.crewai
    depends_on:
      - litellm
      - chromadb
    command: ["python", "-u", "-m", "main.py"]

volumes:
  agent-memory:
