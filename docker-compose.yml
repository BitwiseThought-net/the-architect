services:
  service:
    container_name: agent-smith
    build:
      context: .
      dockerfile: Dockerfile
    stdin_open: true
    tty: true
    volumes:
      - agent-memory:/app/.crewai
    working_dir: /app
    env_file:
      - .env
    environment:
      - TEAM_CONFIG=team.json
      - PYTHONUNBUFFERED=1
      - PYTHONPATH=.
      - OPENAI_API_BASE=${LITELLM_BASE_URL}
      - CHROMA_API_BASE=http://chromadb:8000
      - CREWAI_STORAGE_DIR=/app/.crewai
      - MAX_RETRIES=3
      - RETRY_DELAY_SECONDS=10
      - MISSION_TIMEOUT_SECONDS=1800
    depends_on:
      - litellm
      - chromadb
    labels:
      autoheal: true

  ollama:
    container_name: agent-ollama
    image: ollama/ollama:latest
    restart: always
    ports:
      - "11434:11434"
    env_file:
      - .env
    volumes:
      - ./ollama:/root/.ollama
    entrypoint: /bin/sh -c "ollama serve & sleep 5 && ollama pull ${MODEL_NAME} && ollama pull nomic-embed-text && wait"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    labels:
      autoheal: true

  litellm:
    container_name: agent-litellm
    image: ghcr.io/berriai/litellm:main-latest
    restart: always
    ports:
      - "${LITELLM_PORT}:4000"
    env_file:
      - .env
    environment:
      - OLLAMA_API_BASE=${OLLAMA_BASE_URL}
    command: ["--model", "ollama/${MODEL_NAME}", "--port", "4000", "--drop_params"]
    depends_on:
      - ollama
    labels:
      autoheal: true

  chromadb:
    container_name: agent-chromadb
    image: chromadb/chroma:latest
    restart: always
    ports:
      - "8000:8000"
    volumes:
      - ./chroma-data:/chroma/chroma
    environment:
      - IS_PERSISTENT=TRUE
      - ANONYMIZED_TELEMETRY=FALSE
    labels:
      autoheal: true

  openwebui:
    container_name: agent-open-webui
    image: ghcr.io/open-webui/open-webui:main
    restart: always
    ports:
      - "${UI_PORT}:8080"
    volumes:
      - ./open-webui:/app/backend/data
    env_file:
      - .env
    environment:
      - "OPENAI_API_BASE_URL=${LITELLM_BASE_URL}"
    depends_on:
      - ollama
    labels:
      autoheal: true


  # The auto-healing watchdog service
  autoheal:
    container_name: agent-autoheal
    depends_on:
      - service
    image: willfarrell/autoheal:latest
    restart: always
    environment:
      # Only watch containers with the 'autoheal=true' label
      - AUTOHEAL_CONTAINER_LABEL=autoheal
    volumes:
      # Required to monitor other containers and issue restart commands
      - /var/run/docker.sock:/var/run/docker.sock
    labels:
      autoheal: true

volumes:
  agent-memory:
