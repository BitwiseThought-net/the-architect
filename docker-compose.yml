services:
  ollama:
    container_name: agent-ollama
    image: ollama/ollama:latest
    restart: always
    ports:
      - "11434:11434"
    env_file:
      - .env
    volumes:
      - ./ollama:/root/.ollama
    # Auto-pulls the main model and embedding model on startup
    entrypoint: /bin/sh -c "ollama serve & sleep 5 && ollama pull ${MODEL_NAME} && ollama pull nomic-embed-text && wait"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  litellm:
    container_name: agent-litellm
    image: ghcr.io/berriai/litellm:main-latest
    restart: always
    ports:
      - "${LITELLM_PORT}:4000"
    environment:
      - OLLAMA_API_BASE=${OLLAMA_BASE_URL}
    env_file:
      - .env
    command: ["--model", "ollama/${MODEL_NAME}", "--port", "4000", "--drop_params"]
    depends_on:
      - ollama

  chromadb:
    container_name: agent-chromadb
    image: chromadb/chroma:latest
    restart: always
    ports:
      - "8000:8000"
    volumes:
      - ./chroma-data:/chroma/chroma
    environment:
      - IS_PERSISTENT=TRUE
      - ANONYMIZED_TELEMETRY=FALSE

  openwebui:
    container_name: agent-open-webui
    image: ghcr.io/open-webui/open-webui:main
    restart: always
    ports:
      - "${UI_PORT}:8080"
    volumes:
      - ./open-webui:/app/backend/data
    environment:
      - "OPENAI_API_BASE_URL=${LITELLM_BASE_URL}"
    env_file:
      - .env
    depends_on:
      - ollama

  agent-service:
    container_name: agent-smith
    build:
      context: ./agent-app
    command: python -u main.py
    stdin_open: true # Required for Human-in-the-Loop input
    tty: true        # Required for Human-in-the-Loop input
    volumes:
#      - ./agent-app:/app
      - agent-memory:/app/.crewai
    environment:
      - PYTHONUNBUFFERED=1 # Ensures real-time log output
      - OPENAI_API_BASE=${LITELLM_BASE_URL}
      - CHROMA_API_BASE=http://chromadb:8000
      - CREWAI_STORAGE_DIR=/app/.crewai
    env_file:
      - .env
    depends_on:
      - litellm
      - chromadb

volumes:
  agent-memory:
